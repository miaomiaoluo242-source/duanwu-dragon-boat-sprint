<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>端午节龙舟冲刺</title>
  <link rel="stylesheet" href="style.css?v=solo-dodge">
</head>
<body>
  <main class="page-shell">
    <section class="hero" aria-labelledby="page-title">
      <div class="festival-mark" aria-hidden="true">
        <span>艾</span>
        <span>粽</span>
        <span>舟</span>
      </div>
      <p class="eyebrow">端午安康 · 单人避浪冲刺</p>
      <h1 id="page-title">端午节龙舟冲刺</h1>
      <p class="intro">点击开始，让龙舟穿过加长河道，收集粽子获得加分，避开浪花障碍冲向终点。</p>
    </section>

    <section class="game-panel" aria-label="单人龙舟冲刺游戏">
      <div class="scoreboard" aria-live="polite">
        <div class="stat">
          <span class="stat-label">剩余时间</span>
          <strong><span id="timeLeft">30.0</span>s</strong>
          <small id="raceState">等待开始</small>
        </div>
        <div class="stat">
          <span class="stat-label">冲刺距离</span>
          <strong><span id="distance">0</span>m</strong>
          <small>长赛道 260m</small>
        </div>
        <div class="stat">
          <span class="stat-label">当前分数</span>
          <strong id="score">0</strong>
          <small>粽子 +8</small>
        </div>
      </div>

      <div class="river-wrap">
        <div class="river" id="river" tabindex="0">
          <div class="bank bank-top" aria-hidden="true">
            <span>🌿</span>
            <span>🍃</span>
            <span>🌿</span>
            <span>🍃</span>
          </div>

          <div class="water-lines" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>

          <div class="lane-guide lane-one" aria-hidden="true"></div>
          <div class="lane-guide lane-two" aria-hidden="true"></div>
          <div class="lane-guide lane-three" aria-hidden="true"></div>

          <div id="trackItems" class="track-items" aria-hidden="true"></div>

          <div class="finish-line" aria-label="终点线">
            <span>终点</span>
          </div>

          <div class="countdown hidden" id="countdown" aria-live="assertive"></div>

          <div class="dragon-boat" id="boat" aria-label="龙舟">
            <div class="dragon-head" aria-hidden="true">🐲</div>
            <div class="boat-body">
              <span class="paddler">🧑</span>
              <span class="paddle paddle-one"></span>
              <span class="paddler">🧑</span>
              <span class="paddle paddle-two"></span>
              <span class="paddler">🧑</span>
            </div>
            <div class="dragon-tail" aria-hidden="true">🎏</div>
          </div>

          <div class="bank bank-bottom" aria-hidden="true">
            <span>🍃</span>
            <span>🌿</span>
            <span>🍃</span>
            <span>🌿</span>
          </div>
        </div>
      </div>

      <div class="message-area" id="message" aria-live="assertive">
        准备好后开始冲刺，沿河道收集粽子、避开浪花。
      </div>

      <div class="action-row">
        <button class="start-btn" id="startBtn" type="button">开始游戏</button>
        <button class="reset-btn" id="resetBtn" type="button">重新开局</button>
      </div>

      <div class="direction-pad" aria-label="移动龙舟">
        <button class="direction-btn up" type="button" data-direction="up" aria-label="向上">↑</button>
        <button class="direction-btn left" type="button" data-direction="left" aria-label="向左">←</button>
        <button class="direction-btn right" type="button" data-direction="right" aria-label="向右">→</button>
        <button class="direction-btn down" type="button" data-direction="down" aria-label="向下">↓</button>
      </div>
    </section>

    <section class="blessing" aria-label="端午祝福">
      <span>粽香满河</span>
      <span>乘风破浪</span>
      <span>端午安康</span>
    </section>
  </main>

  <script src="script.js?v=solo-dodge"></script>
</body>
</html>

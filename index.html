<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>端午节龙舟冲刺</title>
  <link rel="stylesheet" href="style.css?v=online-pk">
</head>
<body>
  <main class="page-shell">
    <section class="hero" aria-labelledby="page-title">
      <div class="festival-mark" aria-hidden="true">
        <span>艾</span>
        <span>粽</span>
        <span>舟</span>
      </div>
      <p class="eyebrow">端午安康 · 双人龙舟 PK</p>
      <h1 id="page-title">端午节龙舟冲刺</h1>
      <p class="intro">两位玩家确认准备后，3、2、1 同时开划。赛道更长，粽子能加分，浪花障碍会拖慢节奏。</p>
    </section>

    <section class="game-panel" aria-label="双人龙舟冲刺游戏">
      <div class="online-panel" aria-label="联机房间">
        <div class="online-actions">
          <button class="net-btn host-btn" id="createRoomBtn" type="button">创建联机房间</button>
          <div class="join-group">
            <input id="roomInput" type="text" maxlength="18" placeholder="输入房间码" aria-label="输入房间码">
            <button class="net-btn join-btn" id="joinRoomBtn" type="button">加入房间</button>
          </div>
          <button class="net-btn local-btn" id="localModeBtn" type="button">同屏模式</button>
          <button class="net-btn leave-btn" id="leaveRoomBtn" type="button" disabled>断开联机</button>
        </div>
        <div class="connection-line" aria-live="polite">
          <span>联机状态：<strong id="connectionStatus">同屏模式</strong></span>
          <span>房间码：<button id="roomCodeDisplay" type="button">未创建</button></span>
        </div>
      </div>

      <div class="scoreboard" aria-live="polite">
        <div class="stat racer-stat red-stat">
          <span class="stat-label">红队距离</span>
          <strong><span id="p1Distance">0</span>m</strong>
          <small id="p1Status">待准备</small>
        </div>
        <div class="stat race-clock">
          <span class="stat-label">比赛用时</span>
          <strong><span id="raceTime">0.0</span>s</strong>
          <small id="raceState">等待准备</small>
        </div>
        <div class="stat racer-stat blue-stat">
          <span class="stat-label">青队距离</span>
          <strong><span id="p2Distance">0</span>m</strong>
          <small id="p2Status">待准备</small>
        </div>
      </div>

      <div class="score-row">
        <div class="score-pill red-pill">红队分数 <strong id="p1Score">0</strong></div>
        <div class="track-length">长赛道 180m</div>
        <div class="score-pill blue-pill">青队分数 <strong id="p2Score">0</strong></div>
      </div>

      <div class="river-wrap">
        <div class="river" id="river">
          <div class="bank bank-top" aria-hidden="true">
            <span>🌿</span>
            <span>🍃</span>
            <span>🌿</span>
            <span>🍃</span>
          </div>

          <div class="water-lines" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>

          <div class="lane-name lane-name-one">红队</div>
          <div class="lane-name lane-name-two">青队</div>
          <div class="lane-divider" aria-hidden="true"></div>

          <div id="trackItems" class="track-items" aria-hidden="true"></div>

          <div class="finish-line" aria-label="终点线">
            <span>终点</span>
          </div>

          <div class="countdown hidden" id="countdown" aria-live="assertive"></div>

          <div class="dragon-boat boat-red" id="p1Boat" aria-label="红队龙舟">
            <div class="dragon-head" aria-hidden="true">🐲</div>
            <div class="boat-body">
              <span class="paddler">🧑</span>
              <span class="paddle paddle-one"></span>
              <span class="paddler">🧑</span>
              <span class="paddle paddle-two"></span>
              <span class="paddler">🧑</span>
            </div>
            <div class="dragon-tail" aria-hidden="true">🎏</div>
          </div>

          <div class="dragon-boat boat-blue" id="p2Boat" aria-label="青队龙舟">
            <div class="dragon-head" aria-hidden="true">🐉</div>
            <div class="boat-body">
              <span class="paddler">🧑</span>
              <span class="paddle paddle-one"></span>
              <span class="paddler">🧑</span>
              <span class="paddle paddle-two"></span>
              <span class="paddler">🧑</span>
            </div>
            <div class="dragon-tail" aria-hidden="true">🎏</div>
          </div>

          <div class="bank bank-bottom" aria-hidden="true">
            <span>🍃</span>
            <span>🌿</span>
            <span>🍃</span>
            <span>🌿</span>
          </div>
        </div>
      </div>

      <div class="message-area" id="message" aria-live="assertive">
        两位选手都准备好后，龙舟赛自动倒计时开跑。
      </div>

      <div class="controls ready-controls">
        <button class="ready-btn red-ready" id="p1ReadyBtn" type="button">红队准备</button>
        <button class="ready-btn blue-ready" id="p2ReadyBtn" type="button">青队准备</button>
      </div>

      <div class="controls paddle-controls">
        <button class="paddle-btn red-paddle" id="p1PaddleBtn" type="button" disabled>红队划一下</button>
        <button class="paddle-btn blue-paddle" id="p2PaddleBtn" type="button" disabled>青队划一下</button>
      </div>

      <div class="controls">
        <button class="reset-btn" id="resetBtn" type="button">重新开局</button>
      </div>
    </section>

    <section class="blessing" aria-label="端午祝福">
      <span>并肩竞渡</span>
      <span>粽香满怀</span>
      <span>端午安康</span>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.5/dist/peerjs.min.js"></script>
  <script>
    window.Peer || document.write('<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"><\/script>');
  </script>
  <script>
    window.Peer || document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js"><\/script>');
  </script>
  <script src="script.js?v=online-pk"></script>
</body>
</html>
